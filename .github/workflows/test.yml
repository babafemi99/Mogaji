name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test $(go list ./... | grep -v 'cmd/mogaji\|internal/domain\|internal/report') -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out